<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球遨遊 Global Pass - 您的專屬旅遊指南</title>
    <!-- 引入 Tailwind CSS 以實現快速且美觀的響應式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自訂字體與平滑滾動 */
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc; /* Tailwind slate-50 */
        }
        /* 卡片懸停時的圖片縮放效果 */
        .card-img-hover:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

    <!-- 導覽列 (Navbar) -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 text-indigo-600">
                <!-- 地球 Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h1 class="text-2xl font-bold tracking-wide">全球遨遊</h1>
            </div>
            <nav class="hidden md:flex gap-6 text-sm font-medium text-slate-600">
                <a href="#" class="hover:text-indigo-600 transition-colors">首頁</a>
                <a href="#destinations" class="hover:text-indigo-600 transition-colors">熱門目的地</a>
                <a href="#" class="hover:text-indigo-600 transition-colors">關於我們</a>
            </nav>
        </div>
    </header>

    <!-- 英雄區塊 (Hero Section) -->
    <section class="bg-indigo-600 text-white py-16 sm:py-24 px-4 text-center">
        <div class="max-w-3xl mx-auto">
            <h2 class="text-4xl sm:text-5xl font-extrabold mb-6 leading-tight">
                探索世界，<br class="sm:hidden">從這裡開始
            </h2>
            <p class="text-lg sm:text-xl text-indigo-100 mb-8 px-4">
                為您精心整理的各地旅遊資訊，點擊下方專屬指南，開啟您的旅程。
            </p>
        </div>
    </section>

    <!-- 主要內容區：旅遊指南清單 (Destinations) -->
    <main id="destinations" class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full">
        
        <div class="mb-8 text-center md:text-left">
            <h3 class="text-2xl sm:text-3xl font-bold text-slate-800 border-b-4 border-indigo-500 inline-block pb-2">
                亞洲精選指南
            </h3>
            <p class="text-slate-500 mt-3 text-sm sm:text-base">點擊下方按鈕，快速前往專屬旅遊頁面</p>
        </div>

        <!-- 小按鈕區塊 -->
        <div class="flex flex-wrap gap-4 justify-center md:justify-start">

            <!-- 按鈕 1：泰國\曼谷通 -->
            <a href="https://linkuei0425.github.io/BANGKOK/" target="_blank" rel="noopener noreferrer" 
               class="inline-flex items-center gap-2 px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-sm sm:text-base font-medium rounded-full shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.242-4.243a8 8 0 1111.314 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                泰國｜曼谷通
            </a>

            <!-- 按鈕 2：清邁通 -->
            <a href="https://linkuei0425.github.io/ChiangMai/index.html" target="_blank" rel="noopener noreferrer" 
               class="inline-flex items-center gap-2 px-6 py-3 bg-teal-600 hover:bg-teal-700 text-white text-sm sm:text-base font-medium rounded-full shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.242-4.243a8 8 0 1111.314 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                泰國｜清邁通
            </a>

        </div>
    </main>

    <!-- 頁尾 (Footer) -->
    <footer class="bg-slate-900 text-slate-400 py-8 text-center">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center justify-center gap-2 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="text-xl font-bold text-white">全球遨遊</span>
            </div>
            <p class="text-sm">© 2026 全球遨遊 Global Pass. All rights reserved.</p>
            <p class="text-xs mt-2 text-slate-500">此頁面為響應式設計展示用，連結將開啟外部視窗。</p>
        </div>
    </footer>

</body>
</html>
